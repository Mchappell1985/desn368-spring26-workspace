<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML 101 — Addressing Your Elements</title>
</head>
<body>

    <!-- Nav Menu -->
    <nav>
        <ul>
            <li><a href="#section1">Section One</a></li>
            <li><a href="#section2">Section Two</a></li>
            <li><a href="#section3">Section Three</a></li>
        </ul>
    </nav>

    <!-- 1 -->
    <section id="section1" class="page-section">
        <h2>Section One</h2>
        <p>This is the first section of the page.</p>
    </section>

    <!-- 2 -->
    <section id="section2" class="page-section">
        <h2>Section Two</h2>
        <p>This is the second section of the page.</p>
    </section>

    <!-- 3 -->
    <section id="section3" class="page-section">
        <h2>Section Three</h2>
        <p>This is the third section of the page.</p>
    </section>

</body>
</html>
    
</body>
</html>
